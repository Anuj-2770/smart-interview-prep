<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Interview Prep</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .navbar { background: #4CAF50; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { color: white; font-size: 20px; }
        .navbar button { background: white; color: #4CAF50; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        h2 { color: #333; margin-bottom: 1.5rem; }
        .topics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .topic-card { background: white; padding: 1.5rem; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; cursor: pointer; transition: transform 0.2s; }
        .topic-card:hover { transform: translateY(-5px); }
        .topic-card h3 { color: #333; margin-bottom: 0.5rem; }
        .topic-card p { color: #666; font-size: 13px; }
        .TECHNICAL { border-top: 4px solid #4CAF50; }
        .HR { border-top: 4px solid #2196F3; }
        #userName { color: white; margin-right: 1rem; }
    </style>
</head>
<body>

<div class="navbar">
    <h1>🎯 Smart Interview Prep</h1>
    <div>
        <span id="userName"></span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <h2>Select a Topic to Practice</h2>
    <div class="topics" id="topics"></div>
</div>

<script>
    const BASE_URL = 'http://localhost:8282';
    const token = localStorage.getItem('token');

    if (!token) window.location.href = 'login.html';

    async function loadProfile() {
        const res = await fetch(`${BASE_URL}/api/user/profile`, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const user = await res.json();
        document.getElementById('userName').textContent = 'Hi, ' + user.name + '!';
    }

    async function loadTopics() {
        const res = await fetch(`${BASE_URL}/api/topics/all`, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const topics = await res.json();
        const container = document.getElementById('topics');
        topics.forEach(topic => {
            container.innerHTML += `
                <div class="topic-card ${topic.category}" onclick="goToQuestions('${topic.name}')">
                    <h3>${topic.name}</h3>
                    <p>${topic.category}</p>
                </div>`;
        });
    }

    function goToQuestions(topic) {
        localStorage.setItem('selectedTopic', topic);
        window.location.href = 'questions.html';
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'login.html';
    }

    loadProfile();
    loadTopics();
</script>
</body>
</html>
